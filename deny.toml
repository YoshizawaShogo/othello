[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true
exclude-dev = false

[advisories]
version = 2
unmaintained = "workspace"
unsound = "workspace"
yanked = "deny"
ignore = []

[bans]
multiple-versions = "allow"
wildcards = "deny"
highlight = "all"
allow-wildcard-paths = false
deny = [
    { crate = "openssl", use-instead = "rustls" },
    { crate = "openssl-sys", use-instead = "rustls" },
]
skip = []
skip-tree = []

[licenses]
version = 2
confidence-threshold = 0.93
include-dev = true
include-build = true
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
]

exceptions = []

[licenses.private]
ignore = false
registries = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
